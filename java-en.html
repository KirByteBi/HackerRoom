<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackerRoom · Java EN</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #status-bar span:first-child::after {
            content: " [JAVA/EN]";
            color: #b87333;
            font-size: 0.8rem;
            margin-left: 5px;
        }
        #output-area {
            font-family: 'Courier New', monospace;
            border-left: 3px solid #b87333;
        }
        .prompt i {
            color: #b87333;
            text-shadow: 0 0 8px #b87333;
        }
    </style>
</head>
<body>
    <div id="hacker-room">
        <div id="status-bar">
            <span>☕ HACKERROOM [JAVA EN]</span>
            <span class="blink">⚠️ ENTERPRISE MODE ⚠️</span>
            <span>IP: 192.168.95.150</span>
        </div>

        <div id="output-area" tabindex="0" autofocus>
            <span class="glitch">[JAVA] Initializing JVM...</span><br>
            <span class="glitch">[JAVA] Loading classes... OK</span><br>
            <span class="glitch">[JAVA] Preparing exploits...</span><br>
            <span class="glitch">[JAVA] Ready. Start typing...</span><br>
            <span id="output-text"></span>
        </div>

        <div id="input-line">
            <div class="prompt">
                <i>☕</i> <span id="prompt-text">java -cp . HackerRoom></span>
            </div>
            <div id="cursor"></div>
        </div>
    </div>

    <div id="control-panel">
        <div class="info-text">
            <span>📊 <span id="lines-label">Lines generated</span>: <span id="line-count">0</span></span>
            <span>⚡ <span id="mode-label">Mode</span>: <span id="mode-status">JAVA</span></span>
        </div>
        <div style="display: flex; gap: 5px;">
            <a href="index.html"><button style="background: #1a4f3a;">🇪🇸 LINUX ES</button></a>
            <a href="index-en.html"><button style="background: #4287f5;">🇬🇧 LINUX EN</button></a>
            <a href="java.html"><button style="background: #4f1a3a;">☕ JAVA ES</button></a>
            <button id="clear-btn">🧹 <span id="clear-label">Clear</span></button>
            <button id="panic-btn">🚨 <span id="panic-label">PANIC</span></button>
        </div>
    </div>

    <script src="scripts-java.js"></script>
</body>
</html>
